<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}食譜收藏夾{% endblock %}</title>
    <!-- 未來這裡可以引入 CSS -->
</head>
<body>
    <header>
        <h1><a href="{{ url_for('recipe.index') }}">食譜收藏夾</a></h1>
    </header>

    <main>
        <!-- 顯示 Flash 訊息 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <!-- 頁面主要內容 -->
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 食譜收藏夾</p>
    </footer>
</body>
</html>
